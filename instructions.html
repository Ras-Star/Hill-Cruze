<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to Play - Hill Cruze</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="screen-container">
        <div class="screen">
            <h1>📖 How to Play</h1>
            <div class="instructions">
                <h2>Desktop Controls</h2>
                <p><strong>← → or A/D</strong>: Steer Left & Right</p>
                <p><strong>↑ or W or Space</strong>: Jump</p>
                <p><strong>↓ or S</strong>: Duck</p>

                <h2>Mobile Controls</h2>
                <p>Use the on-screen buttons to control the cyclist.</p>

                <h2>Objective</h2>
                <p>Ride as far as you can, collect power-ups, and avoid obstacles to set a new high score!</p>
            </div>
            <a href="game.html" class="btn">🚀 Let's Go!</a>
            <a href="index.html" class="btn">⬅️ Main Menu</a>
        </div>
    </div>
</body>
</html>
