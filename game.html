<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hill Cruze | Ride The Terrain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-shell" data-mode="menu">
    <div class="game-shell__bg"></div>

    <header class="game-header">
        <div class="game-topbar">
            <a class="brand-mark" href="index.html">
                <span class="brand-mark__icon">HC</span>
                <span>
                    <strong>Hill Cruze</strong>
                    <small>Endless cyclist arcade</small>
                </span>
            </a>

            <div class="game-topbar__actions">
                <a class="hc-button hc-button--ghost hc-button--compact" href="index.html">
                    <span class="button-icon" aria-hidden="true">H</span>Hub
                </a>
                <button class="hc-button hc-button--primary hc-button--compact" id="pauseToggleBtn" type="button">
                    <span class="button-icon" aria-hidden="true">||</span>Pause
                </button>
            </div>
        </div>
    </header>

    <main class="game-main">
        <section class="game-stage">
            <div id="phaser-root" class="phaser-root"></div>

            <div class="game-loader hc-loader" id="gameLoader" data-state="loading" aria-live="polite">
                <div class="game-loader__panel">
                    <span class="game-loader__eyebrow" id="gameLoaderEyebrow">Booting</span>
                    <strong class="game-loader__title" id="gameLoaderTitle">Preparing Hill Cruze</strong>
                    <p class="game-loader__message" id="gameLoaderMessage">Warming up the renderer, fonts, and run systems.</p>
                    <div class="game-loader__progress">
                        <div class="game-loader__progress-fill" id="gameLoaderFill"></div>
                    </div>
                    <span class="game-loader__percent" id="gameLoaderPercent">0%</span>
                    <button class="hc-button hc-button--primary hc-button--compact game-loader__retry" id="gameLoaderRetry" type="button">
                        <span class="button-icon" aria-hidden="true">R</span>Retry Load
                    </button>
                </div>
            </div>

            <div class="hud-telemetry hud-telemetry--left">
                <div class="hud-stack hud-stack--triple">
                    <div class="hud-stack__item hud-stack__item--score">
                        <span>Score</span>
                        <strong id="hudScore">0</strong>
                    </div>
                    <div class="hud-stack__item hud-stack__item--distance">
                        <span>Distance</span>
                        <strong id="hudDistance">0 m</strong>
                    </div>
                    <div class="hud-stack__item hud-stack__item--coins">
                        <span>Coins</span>
                        <strong id="hudCoins">0</strong>
                    </div>
                </div>
            </div>

            <div class="hud-telemetry hud-telemetry--right">
                <div class="hud-stack hud-stack--duo">
                    <div class="hud-stack__item hud-stack__item--speed">
                        <span>Speed</span>
                        <strong id="hudSpeed">0 km/h</strong>
                    </div>
                </div>
            </div>

            <div class="hud-centerline">
                <div class="hud-countdown" id="hudCountdown"></div>
                <div class="hud-livewarning" id="hudWarning" data-state="clear">Clear track</div>
            </div>

            <div class="hud-bottom">
                <div class="hud-bottom__rail">
                    <div class="hud-meter">
                        <div class="hud-meter__label-row">
                            <span>Boost</span>
                            <strong id="hudStaminaLabel">100%</strong>
                        </div>
                        <div class="stamina-meter">
                            <div class="stamina-meter__fill" id="hudStaminaFill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mobile-control-zone mobile-control-zone--runner" id="mobileControls">
                <div class="mobile-control-zone__cluster mobile-control-zone__cluster--actions">
                    <button class="mobile-controls__btn hc-control" data-action="jump" type="button" aria-label="Jump">
                        <span class="control-glyph" aria-hidden="true">UP</span>
                    </button>
                    <button class="mobile-controls__btn hc-control" data-action="duck" type="button" aria-label="Duck">
                        <span class="control-glyph" aria-hidden="true">DN</span>
                    </button>
                    <button class="mobile-controls__btn mobile-controls__btn--accent hc-control" data-action="boost" type="button" aria-label="Boost">
                        <span class="control-glyph" aria-hidden="true">BST</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="js/game/main.js"></script>
</body>
</html>
